<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>근로복지공단 자동화</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- 헤더 -->
    <header class="header">
      <h1>🏢 근로복지공단 자동화</h1>
      <span class="version">v1.0.0</span>
    </header>

    <!-- 탭 메뉴 -->
    <nav class="tabs">
      <button class="tab active" data-tab="api">API다운로드</button>
      <button class="tab" data-tab="data">데이터</button>
      <button class="tab" data-tab="batch">일괄작업</button>
      <button class="tab" data-tab="settings">설정</button>
    </nav>

    <!-- API 다운로드 탭 -->
    <section id="api" class="tab-content active">
      <div class="card">
        <h2>인증 상태</h2>
        <div id="authStatus" class="info-box">
          <p>확인 중...</p>
        </div>
        <button id="btnOpenSite" class="btn full-width">근로복지공단 사이트 열기</button>
      </div>

      <div class="card">
        <h2>사업장 목록</h2>
        <div class="form-group">
          <label>사업장 정보 입력 (한 줄에 하나씩)</label>
          <textarea id="saeopjangList" rows="6" placeholder="관리번호,사업장ID,사업장명
83602013240,50000021821,ABC회사
83602013241,50000021822,DEF회사"></textarea>
        </div>
        <div class="form-group">
          <label>또는 CSV 파일 업로드</label>
          <input type="file" id="saeopjangFile" accept=".csv,.txt">
        </div>
      </div>

      <div class="card">
        <h2>조회 옵션</h2>
        <div class="form-group">
          <label for="boheomFg">보험구분</label>
          <select id="boheomFg" class="select">
            <option value="3">고용보험</option>
            <option value="4">산재보험</option>
          </select>
        </div>
        <div class="form-group">
          <label for="gyStatusCd">고용상태</label>
          <select id="gyStatusCd" class="select">
            <option value="0">고용중</option>
            <option value="1">고용종료</option>
          </select>
        </div>
        <div class="form-group">
          <label for="apiDelay">요청 간격 (ms)</label>
          <input type="number" id="apiDelay" value="2000" min="1000" max="10000">
        </div>
      </div>

      <div class="card">
        <h2>일괄 다운로드 실행</h2>
        <div id="apiProgress" class="progress-container" style="display: none;">
          <div class="progress-bar">
            <div class="progress-fill" id="apiProgressBar" style="width: 0%"></div>
          </div>
          <p class="progress-text" id="apiProgressText">0 / 0 완료</p>
        </div>
        <div class="button-group">
          <button id="btnStartApiDownload" class="btn primary">일괄 다운로드 시작</button>
          <button id="btnStopApiDownload" class="btn danger" disabled>중지</button>
        </div>
      </div>

      <div class="card">
        <h2>실행 결과</h2>
        <div id="apiResult" class="result-box">
          <p class="placeholder">결과가 여기에 표시됩니다.</p>
        </div>
      </div>
    </section>

    <!-- 데이터 탭 -->
    <section id="data" class="tab-content">
      <div class="card">
        <h2>페이지 정보</h2>
        <div id="pageInfo" class="info-box">
          <p>현재 탭 정보를 불러오는 중...</p>
        </div>
        <button id="btnRefreshInfo" class="btn secondary">새로고침</button>
      </div>
      <div class="card">
        <h2>데이터 추출</h2>
        <div class="button-group vertical">
          <button id="btnExtractTable" class="btn primary">테이블 데이터 추출</button>
          <button id="btnExtractForm" class="btn primary">폼 데이터 추출</button>
          <button id="btnExtractAll" class="btn primary">전체 데이터 추출</button>
        </div>
      </div>
      <div class="card">
        <h2>추출 결과</h2>
        <div id="extractResult" class="result-box">
          <p class="placeholder">추출된 데이터가 여기에 표시됩니다.</p>
        </div>
        <div class="button-group">
          <button id="btnDownloadJson" class="btn secondary" disabled>JSON 다운로드</button>
          <button id="btnDownloadCsv" class="btn secondary" disabled>CSV 다운로드</button>
        </div>
      </div>
    </section>

    <!-- 일괄작업 탭 -->
    <section id="batch" class="tab-content">
      <div class="card">
        <h2>일괄 작업 설정</h2>
        <div class="form-group">
          <label for="batchDataInput">작업 데이터 (JSON 배열)</label>
          <textarea id="batchDataInput" rows="8" placeholder='[
  {"type": "fill", "data": {"필드1": "값1"}},
  {"type": "click", "selector": "#버튼ID"},
  {"type": "wait", "duration": 1000}
]'></textarea>
        </div>
        <div class="form-group">
          <label for="batchFile">또는 파일에서 불러오기</label>
          <input type="file" id="batchFile" accept=".json,.csv">
        </div>
      </div>
      <div class="card">
        <h2>작업 실행</h2>
        <div id="batchProgress" class="progress-container" style="display: none;">
          <div class="progress-bar">
            <div class="progress-fill" style="width: 0%"></div>
          </div>
          <p class="progress-text">0 / 0 완료</p>
        </div>
        <div class="button-group">
          <button id="btnRunBatch" class="btn primary">일괄 작업 실행</button>
          <button id="btnStopBatch" class="btn danger" disabled>중지</button>
        </div>
      </div>
      <div class="card">
        <h2>작업 결과</h2>
        <div id="batchResult" class="result-box">
          <p class="placeholder">작업 결과가 여기에 표시됩니다.</p>
        </div>
      </div>
    </section>

    <!-- 설정 탭 -->
    <section id="settings" class="tab-content">
      <div class="card">
        <h2>자동화 설정</h2>
        <div class="checkbox-group">
          <input type="checkbox" id="settingAutoLogin">
          <label for="settingAutoLogin">자동 로그인 활성화</label>
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="settingNotifications" checked>
          <label for="settingNotifications">알림 표시</label>
        </div>
        <div class="form-group">
          <label for="settingDelay">작업 간 대기 시간 (ms)</label>
          <input type="number" id="settingDelay" value="1000" min="100" max="10000">
        </div>
        <button id="btnSaveSettings" class="btn primary full-width">설정 저장</button>
      </div>
      <div class="card">
        <h2>정보</h2>
        <p>버전: 1.0.0</p>
        <p>대상 사이트: total.comwel.or.kr</p>
        <p class="warning">⚠️ 비밀번호는 로컬에 암호화되어 저장됩니다.</p>
      </div>
    </section>

    <!-- 상태 메시지 -->
    <div id="statusMessage" class="status-message"></div>
  </div>

  <script src="../utils/storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
